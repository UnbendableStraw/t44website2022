<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nic's Fix — Our shop has moved</title>

<!-- ============================================================= -->
<!--  👇  EDIT THIS ONE LINE: set href to your new shop portal URL  -->
<!--      (it's the "Continue to the shop" link, id="go", below)     -->
<!-- ============================================================= -->

<style>
  :root{
    --bg:#f5f5f7; --card:#ffffff; --ink:#1d1d1f; --muted:#6e6e73;
    --border:#e3e3e8; --brand:#2d52e0; --brand2:#2f6fed;
    --pod-top:#ffffff; --pod-bot:#d7dae1; --mesh:rgba(0,0,0,.07);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1115; --card:#1a1d23; --ink:#f2f3f5; --muted:#9aa0aa;
      --border:#2a2e36; --brand:#5b82ff; --brand2:#6f93ff;
      --pod-top:#f4f6fa; --pod-bot:#c4c8d2; --mesh:rgba(0,0,0,.10);
    }
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ width:100%; max-width:440px; text-align:center; }
  .brand{ font-weight:800; font-size:22px; letter-spacing:-.02em; margin-bottom:26px; }
  .brand .dot{ color:var(--brand); }
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:22px;
    padding:38px 30px 30px; box-shadow:0 14px 50px rgba(0,0,0,.10);
  }

  /* ---- Spinning HomePod ---- */
  .stage{ height:190px; display:flex; align-items:center; justify-content:center; margin-bottom:6px; }
  .pod{ width:150px; height:190px; }
  .pod .ground{ animation:breathe 2.8s ease-in-out infinite; transform-origin:100px 244px; }
  .mesh-rect{ animation:meshscroll 1.25s linear infinite; }
  .glare{ animation:glaresweep 2.6s ease-in-out infinite; }
  .siri{ animation:siri 3.2s ease-in-out infinite; transform-origin:100px 58px; }
  @keyframes meshscroll{ from{transform:translateX(0);} to{transform:translateX(-6px);} }
  @keyframes glaresweep{ 0%{transform:translateX(-70px);opacity:0;} 18%{opacity:.9;} 50%{transform:translateX(150px);opacity:.9;} 60%{opacity:0;} 100%{transform:translateX(150px);opacity:0;} }
  @keyframes breathe{ 0%,100%{transform:scaleX(1);opacity:.20;} 50%{transform:scaleX(.82);opacity:.12;} }
  @keyframes siri{ 0%,100%{opacity:.45;} 50%{opacity:.9;} }
  @media (prefers-reduced-motion: reduce){
    .mesh-rect,.glare,.siri,.ground{ animation:none !important; }
  }

  h1{ font-size:22px; line-height:1.25; letter-spacing:-.02em; margin:6px 0 6px; }
  p.sub{ color:var(--muted); font-size:15px; margin:0 0 20px; }
  .dots::after{ content:'…'; animation:dots 1.4s steps(4,end) infinite; }
  @keyframes dots{ 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} }

  .bar{ height:5px; width:100%; background:var(--border); border-radius:999px; overflow:hidden; margin:4px 0 22px; }
  .bar > i{ display:block; height:100%; width:0; border-radius:999px;
    background:linear-gradient(90deg,var(--brand),var(--brand2)); animation:fill 4s linear forwards; }
  @keyframes fill{ from{width:0;} to{width:100%;} }

  .go{ display:inline-block; background:var(--brand); color:#fff; text-decoration:none;
    font-weight:600; font-size:15px; padding:12px 22px; border-radius:12px; transition:transform .1s ease,filter .15s ease; }
  .go:hover{ filter:brightness(1.06); }
  .go:active{ transform:translateY(1px); }
  .foot{ color:var(--muted); font-size:12.5px; margin-top:16px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">Nic's Fix<span class="dot">.</span></div>

    <div class="card">
      <div class="stage">
        <svg class="pod" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="var(--pod-top)"/>
              <stop offset="1" stop-color="var(--pod-bot)"/>
            </linearGradient>
            <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#fff" stop-opacity="0"/>
              <stop offset=".5" stop-color="#fff" stop-opacity=".75"/>
              <stop offset="1" stop-color="#fff" stop-opacity="0"/>
            </linearGradient>
            <radialGradient id="siriglow" cx=".5" cy=".5" r=".5">
              <stop offset="0" stop-color="#7aa8ff"/>
              <stop offset=".55" stop-color="#9b7bff" stop-opacity=".7"/>
              <stop offset="1" stop-color="#9b7bff" stop-opacity="0"/>
            </radialGradient>
            <pattern id="mesh" width="6" height="9" patternUnits="userSpaceOnUse">
              <line x1="0.5" y1="0" x2="0.5" y2="9" stroke="var(--mesh)" stroke-width="1"/>
            </pattern>
            <clipPath id="bodyclip"><rect x="40" y="46" width="120" height="170" rx="36"/></clipPath>
          </defs>

          <!-- ground shadow (stays put) -->
          <ellipse class="ground" cx="100" cy="244" rx="62" ry="13" fill="#000"/>

          <!-- body -->
          <g clip-path="url(#bodyclip)">
            <rect x="40" y="46" width="120" height="170" fill="url(#body)"/>
            <!-- fabric mesh scrolling sideways = the speaker spinning -->
            <rect class="mesh-rect" x="22" y="46" width="156" height="170" fill="url(#mesh)"/>
            <!-- soft top + bottom shading for depth -->
            <ellipse cx="100" cy="58" rx="60" ry="20" fill="#000" opacity="0.05"/>
            <ellipse cx="100" cy="214" rx="60" ry="20" fill="#000" opacity="0.10"/>
            <!-- moving specular highlight -->
            <rect class="glare" x="40" y="46" width="46" height="170" fill="url(#sheen)" opacity="0"/>
          </g>

          <!-- top touch surface -->
          <ellipse cx="100" cy="58" rx="52" ry="15" fill="var(--pod-top)" stroke="#000" stroke-opacity="0.06"/>
          <ellipse class="siri" cx="100" cy="58" rx="34" ry="9" fill="url(#siriglow)"/>
        </svg>
      </div>

      <h1>Our shop has a new home</h1>
      <p class="sub">Taking you to the new Nic's Fix shop<span class="dots"></span></p>
      <div class="bar"><i></i></div>

      <!-- 👇 EDIT THE href BELOW to your new shop portal URL -->
      <a id="go" class="go" href="https://REPLACE-WITH-YOUR-SHOP-URL.example/shop">Continue to the shop →</a>

      <div class="foot">You'll be redirected automatically. If nothing happens, tap the button.</div>
    </div>
  </div>

<script>
  // Single source of truth: the "Continue to the shop" link's href (edit it above).
  (function(){
    var link = document.getElementById('go');
    var url = link && link.getAttribute('href');
    if (!url || url.indexOf('REPLACE-WITH-YOUR-SHOP-URL') !== -1) return; // not configured yet
    setTimeout(function(){ window.location.replace(url); }, 4000);
  })();
</script>
</body>
</html>
